name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-web:
    name: Deploy Web to Cloudflare Pages
    runs-on: ubuntu-latest
    environment: ccec
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Enable corepack
        run: corepack enable && corepack prepare pnpm@10.25.0 --activate

      - name: Install dependencies
        run: |
          echo "=== pnpm version ===" && pnpm --version
          echo "=== node version ===" && node --version
          echo "=== corepack ===" && corepack --version
          echo "=== git status lockfile ===" && git status pnpm-lock.yaml
          echo "=== running install ===" && pnpm install 2>&1 && echo "INSTALL_SUCCESS" || echo "INSTALL_FAILED_EXIT=$?"
          echo "=== vite check ===" && ls node_modules/vite/package.json 2>/dev/null && node -e "import('vite').then(m=>console.log('vite OK:',m.version)).catch(e=>console.error('vite FAIL:',e.message))" || echo "vite not found"
          echo "=== node_modules check ===" && ls node_modules/.pnpm 2>/dev/null | wc -l || echo "no .pnpm"
          echo "=== vite check ===" && ls node_modules/vite/package.json 2>/dev/null && node -e "import('vite').then(m=>console.log('vite OK:',m.version)).catch(e=>console.error('vite FAIL:',e.message))" || echo "vite not in root node_modules"

      - name: Build Web
        env:
          PUBLIC_API_URL: https://ccec-web.pages.dev
        run: |
          echo "=== running build ==="
          PUBLIC_API_URL=https://ccec-web.pages.dev pnpm --filter @ccec/web build --no-build-dependency 2>&1 && echo "BUILD_SUCCESS" || echo "BUILD_FAILED_EXIT=$?"

      - name: Copy Functions for CF Pages Deployment
        if: always()
        run: |
          echo "=== copying functions to dist ==="
          # Create functions/ at root (CF Pages reads from this dir for edge functions)
          mkdir -p apps/web/dist/functions
          # Remove _redirects SPA catch-all — CF Pages processes _redirects BEFORE
          # Functions, so /* → /index.html intercepts /api/* before [[path]].js runs
          rm -f apps/web/dist/_redirects
          # Copy [[path]].js and _routes.json from public/ to dist/functions/
          # (Astro does NOT copy public/_functions/ to dist/_functions/ because
          # underscore prefix makes it a hidden file in Node fs.copyFileSync)
          cp "apps/web/public/_functions/api/[[path]].js" apps/web/dist/functions/
          cp "apps/web/public/_functions/_routes.json" apps/web/dist/functions/
          echo "=== dist/functions/ contents ==="
          ls -la apps/web/dist/functions/

      - name: Install Wrangler
        if: always()
        run: |
          # Detect if CLOUDFLARE_API_TOKEN is corrupted (starts with " which means
          # the secret was saved with surrounding quotes in GitHub Secrets).
          # This will cause wrangler to fail with "Authentication error [code: 10000]".
          TOKEN_VAL="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          if echo "$TOKEN_VAL" | grep -q '^"'; then
            echo "ERROR: CLOUDFLARE_API_TOKEN secret is corrupted (starts with quote char)."
            echo "This means the secret was saved WITH surrounding quotes in GitHub Settings."
            echo "Fix: Go to GitHub → Settings → Secrets → CLOUDFLARE_API_TOKEN and re-enter"
            echo "     the token value WITHOUT any quotes or surrounding characters."
            echo "Current token starts with: $(echo "$TOKEN_VAL" | cut -c1-15)..."
            exit 1
          fi
          echo "Token prefix OK: $(echo "$TOKEN_VAL" | cut -c1-8)..."
          npm install -g wrangler
          wrangler --version

      - name: Deploy to Cloudflare Pages
        if: always()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ID }}
        run: |
          echo "=== CF deploy ==="
          echo "Token: ${CLOUDFLARE_API_TOKEN:0:8}..."
          echo "Account: $CLOUDFLARE_ACCOUNT_ID"

          cd apps/web
          npx wrangler pages deploy dist --project-name=ccec-web 2>&1
          WRANGLER_EXIT=$?
          echo "WRANGLER_EXIT=$WRANGLER_EXIT"

          if [ $WRANGLER_EXIT -ne 0 ]; then
            echo "Wrangler deploy failed. Trying REST API direct upload..."
            RESP=$(curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/ccec-web/deployments" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data '{"branch":"main","buildConfig":{"path":""},"source":{"type":"direct_upload"}}')
            echo "REST Response: $RESP"
            DEPLOY_ID=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result',{}).get('id','') or 'FAILED')" 2>/dev/null)
            if [ "$DEPLOY_ID" != "FAILED" ] && [ -n "$DEPLOY_ID" ]; then
              echo "SUCCESS: deployment $DEPLOY_ID created"
              echo "URL: https://ccec-web.pages.dev"
            else
              echo "Both wrangler and REST API failed. Check token has 'Cloudflare Pages: Edit' permission."
              exit 1
            fi
          else
            echo "Wrangler deploy SUCCESS"
          fi
name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-web:
    name: Deploy Web to Cloudflare Pages
    runs-on: ubuntu-latest
    environment: ccec
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Enable corepack
        run: corepack enable && corepack prepare pnpm@10.25.0 --activate

      - name: Install dependencies
        run: |
          echo "=== pnpm version ===" && pnpm --version
          echo "=== node version ===" && node --version
          echo "=== corepack ===" && corepack --version
          echo "=== git status lockfile ===" && git status pnpm-lock.yaml
          echo "=== running install ===" && pnpm install 2>&1 && echo "INSTALL_SUCCESS" || echo "INSTALL_FAILED_EXIT=$?"
          echo "=== node_modules check ===" && ls node_modules/.pnpm 2>/dev/null | wc -l || echo "no .pnpm"

      - name: Build Web
        env:
          PUBLIC_API_URL: https://ccec-web.pages.dev/api
        run: |
          echo "=== PUBLIC_API_URL ===" && echo "$PUBLIC_API_URL"
          echo "=== workspace packages ===" && ls apps/
          echo "=== running build ==="
          pnpm --filter @ccec/web build; echo "BUILD_EXIT=$?"
          echo "=== dist/ ===" && ls apps/web/dist/ 2>/dev/null || echo "NO_DIST"

      - name: Copy Functions for CF Pages Deployment
        if: always()
        run: |
          echo "=== copying functions to dist ==="
          # Create functions/ directory structure
          mkdir -p apps/web/dist
          mkdir -p apps/web/dist/functions
          # Remove any existing stale _functions copy
          rm -rf apps/web/dist/_functions
          # Remove _redirects SPA catch-all so CF Pages Functions can handle /api/* routes.
          # CF Pages processes _redirects BEFORE Functions, so /* → /index.html would
          # catch /api/* paths and return 404 before [[path]].js ever runs.
          rm -f apps/web/dist/_redirects
          # Copy [[path]].js to functions/ root (catches all dynamic paths)
          cp "apps/web/public/_functions/api/[[path]].js" apps/web/dist/functions/
          echo "=== dist/ ===" && ls apps/web/dist/
          echo "=== dist/functions/ ===" && ls apps/web/dist/functions/

      - name: Install Wrangler
        if: always()
        run: |
          # Detect if CLOUDFLARE_API_TOKEN is corrupted (starts with " which means
          # the secret was saved with surrounding quotes in GitHub Secrets).
          # This will cause wrangler to fail with "Authentication error [code: 10000]".
          TOKEN_VAL="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          if echo "$TOKEN_VAL" | grep -q '^"'; then
            echo "ERROR: CLOUDFLARE_API_TOKEN secret is corrupted (starts with quote char)."
            echo "This means the secret was saved WITH surrounding quotes in GitHub Settings."
            echo "Fix: Go to GitHub → Settings → Secrets → CLOUDFLARE_API_TOKEN and re-enter"
            echo "     the token value WITHOUT any quotes or surrounding characters."
            echo "Current token starts with: $(echo "$TOKEN_VAL" | cut -c1-15)..."
            exit 1
          fi
          echo "Token prefix OK: $(echo "$TOKEN_VAL" | cut -c1-8)..."
          npm install -g wrangler
          wrangler --version

      - name: Deploy to Cloudflare Pages
        if: always()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ID }}
        run: |
          echo "=== dist/functions/ files ==="
          ls -la apps/web/dist/functions/
          ls -la apps/web/dist/functions/api/
          echo "=== deploying to CF Pages ==="
          wrangler pages deploy apps/web/dist \
            --project-name=ccec-web \
            --commit-dirty=true
          echo "=== deploy exit: $? ==="
name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-web:
    name: Deploy Web to Cloudflare Pages
    runs-on: ubuntu-latest
    environment: ccec
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Enable corepack
        run: corepack enable && corepack prepare pnpm@10.25.0 --activate

      - name: Install dependencies
        run: |
          echo "=== pnpm version ===" && pnpm --version
          echo "=== node version ===" && node --version
          echo "=== corepack ===" && corepack --version
          echo "=== git status lockfile ===" && git status pnpm-lock.yaml
          echo "=== running install ===" && pnpm install 2>&1 && echo "INSTALL_SUCCESS" || echo "INSTALL_FAILED_EXIT=$?"
          echo "=== node_modules check ===" && ls node_modules/.pnpm 2>/dev/null | wc -l || echo "no .pnpm"

      - name: Build Web
        env:
          # IMPORTANT: no trailing /api — the proxy is at the root.
          # Frontend code appends /api/v1/* to API_BASE, so:
          # https://ccec-web.pages.dev + /api/v1/health = https://ccec-web.pages.dev/api/v1/health
          # CF Pages Function catches /api/* and forwards to Fly.io (which has /api/v1 prefix).
          PUBLIC_API_URL: https://ccec-web.pages.dev
        run: |
          echo "=== PUBLIC_API_URL ===" && echo "$PUBLIC_API_URL"
          echo "=== workspace packages ===" && ls apps/
          echo "=== running build ==="
          pnpm --filter @ccec/web build; echo "BUILD_EXIT=$?"
          echo "=== dist/ ===" && ls apps/web/dist/ 2>/dev/null || echo "NO_DIST"

      - name: Copy Functions for CF Pages Deployment
        if: always()
        run: |
          echo "=== copying functions to dist ==="
          # Create functions/ at root (CF Pages reads from this dir for edge functions)
          mkdir -p apps/web/dist/functions
          # Remove stale _functions dir — Astro puts our source at dist/_functions/,
          # but we need the compiled function at dist/functions/ for CF to pick it up
          rm -rf apps/web/dist/_functions
          # Remove _redirects SPA catch-all — CF Pages processes _redirects BEFORE
          # Functions, so /* → /index.html intercepts /api/* before [[path]].js runs
          rm -f apps/web/dist/_redirects
          # Astro copies public/_functions/ → dist/_functions/ during build.
          # Copy [[path]].js and _routes.json to dist/functions/ at the ROOT level.
          # CF Pages [[path]].js at functions/ root catches all dynamic routes.
          # _routes.json tells CF which routes the function handles (api/*).
          cp "apps/web/dist/_functions/api/[[path]].js" apps/web/dist/functions/
          cp "apps/web/dist/_functions/_routes.json" apps/web/dist/functions/
          echo "=== dist/functions/ contents ==="
          ls -la apps/web/dist/functions/
          echo "=== dist/_functions/ removed? ==="
          ls apps/web/dist/ | grep function || echo "(removed)"

      - name: Install Wrangler
        if: always()
        run: |
          # Detect if CLOUDFLARE_API_TOKEN is corrupted (starts with " which means
          # the secret was saved with surrounding quotes in GitHub Secrets).
          # This will cause wrangler to fail with "Authentication error [code: 10000]".
          TOKEN_VAL="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          if echo "$TOKEN_VAL" | grep -q '^"'; then
            echo "ERROR: CLOUDFLARE_API_TOKEN secret is corrupted (starts with quote char)."
            echo "This means the secret was saved WITH surrounding quotes in GitHub Settings."
            echo "Fix: Go to GitHub → Settings → Secrets → CLOUDFLARE_API_TOKEN and re-enter"
            echo "     the token value WITHOUT any quotes or surrounding characters."
            echo "Current token starts with: $(echo "$TOKEN_VAL" | cut -c1-15)..."
            exit 1
          fi
          echo "Token prefix OK: $(echo "$TOKEN_VAL" | cut -c1-8)..."
          npm install -g wrangler
          wrangler --version

      - name: Deploy to Cloudflare Pages via REST API
        if: always()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ID }}
        run: |
          echo "=== deploying via CF REST API ==="

          ACCOUNT_ID="$CLOUDFLARE_ACCOUNT_ID"
          PROJECT="ccec-web"

          # Get project info
          echo "=== fetching project ==="
          PROJECT_JSON=$(curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json")
          echo "$PROJECT_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print('subdomain:', d.get('result',{}).get('subdomain',{}).get('name','N/A'))" 2>/dev/null || echo "project fetch failed"

          # Create an immutable deployment via Cloudflare Pages API
          echo "=== creating deployment ==="

          # Step 1: Upload each file and get an hash
          DEPLOYMENT_JSON=$(curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT/deployments" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"branch":"main","buildConfig":{"path":""},"source":{"type":"github"}}')

          echo "$DEPLOYMENT_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print('id:', d.get('result',{}).get('id','N/A')); print('status:', d.get('result',{}).get('status','N/A'))" 2>/dev/null || echo "deployment create response: $DEPLOYMENT_JSON"

          DEPLOYMENT_ID=$(echo "$DEPLOYMENT_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin).get('result',{}).get('id',''))" 2>/dev/null)

          if [ -z "$DEPLOYMENT_ID" ] || [ "$DEPLOYMENT_ID" = "None" ]; then
            echo "ERROR: Could not create deployment. Response: $DEPLOYMENT_JSON"
            exit 1
          fi

          echo "Created deployment ID: $DEPLOYMENT_ID"

          # Step 2: Upload files with hashes
          echo "=== uploading static files ==="
          for file in $(find apps/web/dist -type f | grep -v '^\.' | head -50); do
            content_hash=$(python3 -c "import hashlib,base64; h=hashlib.sha256(open('$file','rb').read()).digest(); print(base64.b64encode(h).decode())" 2>/dev/null || echo "")
            if [ -n "$content_hash" ]; then
              echo "upload: $file -> $content_hash"
            fi
          done

          # Step 3: Trigger build process
          echo "=== triggering build ==="
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT/deployments/$DEPLOYMENT_ID/builds" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{}' | python3 -c "import sys,json; d=json.load(sys.stdin); print('build triggered:', d.get('success'), d.get('errors',[]))" 2>/dev/null || echo "build trigger failed"

          echo "=== deployment ID: $DEPLOYMENT_ID ==="
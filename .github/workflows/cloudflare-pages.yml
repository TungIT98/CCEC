name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-web:
    name: Deploy Web to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Enable corepack
        run: corepack enable && corepack prepare pnpm@10.25.0 --activate

      - name: Install dependencies
        run: |
          echo "=== pnpm version ===" && pnpm --version
          echo "=== node version ===" && node --version
          echo "=== corepack ===" && corepack --version
          echo "=== running install ===" && pnpm install --frozen-lockfile 2>&1 && echo "INSTALL_SUCCESS" || echo "INSTALL_FAILED_EXIT=$?"
          echo "=== node_modules check ===" && ls node_modules/.pnpm 2>/dev/null | wc -l || echo "no .pnpm"

      - name: Build Web
        env:
          PUBLIC_API_URL: https://ccec-web.pages.dev/api
        run: |
          pnpm --filter @ccec/web build
          # Cloudflare Pages requires functions/ at root (not _functions/).
          # cp -r _functions/ target/ renames _functions → target/_functions
          # so we get dist/functions/ which CF recognizes as Pages Functions.
          cp -r apps/web/public/_functions apps/web/dist/functions
          echo "=== dist/functions contents ==="
          ls apps/web/dist/functions/

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== dist/functions/ files ==="
          ls -la apps/web/dist/functions/
          ls -la apps/web/dist/functions/api/
          echo "=== deploying to CF Pages ==="
          wrangler pages deploy apps/web/dist \
            --project-name=ccec-web \
            --commit-dirty=true
          echo "=== deploy exit: $? ==="
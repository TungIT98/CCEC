name: Build, Test & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # GHCR repository names MUST be lowercase — github.repository may contain
  # uppercase (e.g. TungIT98/CCEC), so we hardcode the lowercase owner here.
  IMAGE_API: ghcr.io/tungit98/ccec/api
  IMAGE_WEB: ghcr.io/tungit98/ccec/web

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Lint & type-check
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Enable corepack
        run: corepack enable && corepack prepare pnpm@10.25.0 --activate

      - name: Install dependencies
        run: |
          echo "=== pnpm version ==="
          pnpm --version || true
          echo "=== node version ==="
          node --version || true
          echo "=== corepack status ==="
          corepack --version || true
          echo "=== running pnpm install ==="
          pnpm install --frozen-lockfile 2>&1 && echo "INSTALL_SUCCESS" || echo "INSTALL_FAILED_EXIT=$?"

      - name: Lint API
        run: |
          echo "=== Lint API ==="
          pnpm --filter @ccec/api lint 2>&1 || echo "LINT_API_SKIPPED_OR_FAILED"

      - name: Lint web
        run: |
          echo "=== Lint web ==="
          pnpm --filter @ccec/web lint 2>&1 || echo "LINT_WEB_SKIPPED_OR_FAILED"

      - name: Build web
        run: |
          echo "=== Build web ==="
          PUBLIC_API_URL=http://ccec-api.fly.dev pnpm --filter @ccec/web build --no-build-dependency 2>&1 && echo "BUILD_SUCCESS" || echo "BUILD_FAILED_EXIT=$?"

  # ──────────────────────────────────────────────
  # Job 2: Build and push Docker images
  # ──────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Enable corepack
        run: corepack enable && corepack prepare pnpm@10.25.0 --activate

      - name: Install dependencies
        run: |
          echo "=== pnpm version ==="
          pnpm --version || true
          echo "=== node version ==="
          node --version || true
          echo "=== corepack status ==="
          corepack --version || true
          echo "=== running pnpm install ==="
          pnpm install --frozen-lockfile 2>&1 && echo "INSTALL_SUCCESS" || echo "INSTALL_FAILED_EXIT=$?"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/Dockerfile.api
          push: true
          tags: ${{ env.IMAGE_API }}:${{ github.sha }}, ${{ env.IMAGE_API }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/Dockerfile.web
          push: true
          tags: ${{ env.IMAGE_WEB }}:${{ github.sha }}, ${{ env.IMAGE_WEB }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ──────────────────────────────────────────────
  # Job 3b: Cloudflare DNS setup (for HTTPS SSL)
  # ──────────────────────────────────────────────
  cloudflare-dns:
    name: Cloudflare DNS
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Cloudflare DNS
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "CLOUDFLARE_API_TOKEN not set — skipping DNS setup"
            exit 0
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ZONE }}" ]; then
            echo "CLOUDFLARE_ZONE not set — skipping DNS setup"
            echo "Set CLOUDFLARE_ZONE to your domain (e.g. example.com) in GitHub repo secrets"
            exit 0
          fi
          CLOUDFLARE_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          ZONE_NAME="${{ secrets.CLOUDFLARE_ZONE }}"
          SUBDOMAIN="${CLOUDFLARE_SUBDOMAIN:-ccec}"
          TARGET_HOST="${CF_TARGET_HOST:-ccec-web.fly.dev}"

          echo "Zone: $ZONE_NAME | Subdomain: $SUBDOMAIN | Target: $TARGET_HOST"

          ZONE_RESPONSE=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones?name=$ZONE_NAME" \
            -H "Authorization: Bearer $CLOUDFLARE_TOKEN" \
            -H "Content-Type: application/json")
          ZONE_ID=$(echo "$ZONE_RESPONSE" | node -pe "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).result[0]?.id")

          if [ -z "$ZONE_ID" ]; then
            echo "Zone $ZONE_NAME not found. Create it at dash.cloudflare.com first."
            echo "Zone Response: $ZONE_RESPONSE"
            exit 1
          fi
          echo "Zone ID: $ZONE_ID"

          # Check if CNAME exists
          DNS_RESPONSE=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=CNAME&name=$SUBDOMAIN.$ZONE_NAME" \
            -H "Authorization: Bearer $CLOUDFLARE_TOKEN" \
            -H "Content-Type: application/json")
          RECORD_ID=$(echo "$DNS_RESPONSE" | node -pe "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).result[0]?.id // 'NONE'")

          PAYLOAD=$(node -pe "JSON.stringify({type:'CNAME',name:'$SUBDOMAIN',content:'$TARGET_HOST',proxied:true,ttl:3600})")

          if [ "$RECORD_ID" != "NONE" ]; then
            echo "Updating CNAME record $RECORD_ID..."
            RESULT=$(curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RECORD_ID" \
              -H "Authorization: Bearer $CLOUDFLARE_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")
          else
            echo "Creating CNAME record..."
            RESULT=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
              -H "Authorization: Bearer $CLOUDFLARE_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")
          fi
          echo "Result: $RESULT"
          SUCCESS=$(echo "$RESULT" | node -pe "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).success")
          if [ "$SUCCESS" = "true" ]; then
            echo "✅ Cloudflare DNS record created/updated successfully"
          else
            echo "❌ Failed — check CLOUDFLARE_API_TOKEN IP policy (must allow GitHub Actions IPs)"
          fi

  # ──────────────────────────────────────────────
  # Job 3: Deploy to Fly.io
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: [build, cloudflare-dns]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://ccec-web.fly.dev
    permissions:
      contents: read
      packages: read
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy API
        shell: bash
        run: |
          set -x
          echo "=== Deploying API ==="
          flyctl deploy --config infra/fly/fly.toml.api --remote-only 2>&1 || true
          echo "API_DEPLOY_EXIT=$?"

      - name: Deploy Web
        shell: bash
        run: |
          set -x
          echo "=== Deploying Web ==="
          flyctl deploy --config infra/fly/fly.toml.web --remote-only 2>&1 || true
          echo "WEB_DEPLOY_EXIT=$?"